packages:
  - "packages/core"
  - "packages/server"
  - "packages/desktop"

# pnpm 10 changed the default of link-workspace-packages to false (requires the
# workspace: protocol). We keep plain semver refs like "@simplecrm/core": "0.1.0"
# so npm's Docker `npm ci` (which does not understand workspace:*) also resolves
# them as local workspace links. This setting restores pnpm's version-based
# workspace linking.
linkWorkspacePackages: true

overrides:
  "@xmldom/xmldom": 0.8.13
  app-builder-bin: 4.2.0
  dompurify: 3.4.12
  "fast-uri@3": 3.1.2
  node-abi: ^4.31.0
  jest-mock: 30.4.1
  jest-runtime: 30.4.2
  jest-circus: 30.4.0
  "js-yaml@4": 4.3.0
  "mailauth@4.13.3>nodemailer": 9.0.3
  "undici@7": 7.28.0
  "ws@8": 8.21.0

allowBuilds:
  "@embedded-postgres/windows-x64": true
  "@parcel/watcher": true
  "@swc/core": true
  better-sqlite3@https://codeload.github.com/WiseLibs/better-sqlite3/tar.gz/b5701cb5483d97825778947cb904630c2c2e821e: true
  electron: true
  electron-winstaller: true
  esbuild: true
  keytar: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - tsx@4.23.1
  - postcss@8.5.19
  - react-resizable-panels@4.12.2
