name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify TypeScript 7 toolchain
        run: pnpm run check:typescript-toolchain

      - name: Install and build isolated Svelte lab
        run: |
          npm ci --legacy-peer-deps --prefix packages/svelte-lab
          npm run build --prefix packages/svelte-lab

      - name: Provide Electron path.txt (tests import 'electron' in Node)
        # The Node-context jest suites do `import … from 'electron'`, which runs
        # electron/index.js → it reads dist/path.txt and THROWS "Electron failed
        # to install correctly" when path.txt is missing. In CI electron's
        # install.js short-circuits (verified: <1s, no download output) and
        # never writes path.txt — pnpm restores the package without it. Since
        # jest runs under Node (never launches the binary), the import only needs
        # index.js to return a path string instead of throwing, i.e. a non-empty
        # path.txt. Reproduce install.js's final step deterministically: it
        # writes path.txt = the platform binary name (getPlatformPath()), which
        # on linux (this runner) is exactly "electron".
        run: |
          node node_modules/electron/install.js || true
          [ -s node_modules/electron/path.txt ] || printf 'electron' > node_modules/electron/path.txt
          test -s node_modules/electron/path.txt

      - name: Rebuild better-sqlite3 for Node (mail integration tests)
        run: npm rebuild better-sqlite3

      - name: Lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm test

      - name: Mail module tests
        run: pnpm run test:mail

      - name: Server module coverage (ratchet)
        run: |
          pnpm run test:server:coverage
          node scripts/check-server-coverage-ratchet.mjs

      - name: Email UI coverage ratchet
        run: pnpm run test:ui:coverage:check

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build (renderer)
        run: pnpm run build

  electron-e2e:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    env:
      CC: gcc-12
      CI: "true"
      CXX: g++-12
      CXXFLAGS: "-UV8_DEPRECATION_WARNINGS"
      SIMPLECRM_E2E_LOG_DIR: test-results/electron-logs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 11.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Electron runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            xvfb \
            dbus \
            gcc-12 \
            g++-12 \
            gnome-keyring \
            libsecret-1-0 \
            libsecret-1-dev \
            libsecret-tools \
            libasound2 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Chromium sandbox helper
        run: |
          sudo chown root:root node_modules/electron/dist/chrome-sandbox
          sudo chmod 4755 node_modules/electron/dist/chrome-sandbox
          test "$(stat -c '%a' node_modules/electron/dist/chrome-sandbox)" = "4755"

      - name: Run Electron E2E suite
        run: |
          dbus-run-session -- bash -euo pipefail -c '
            eval "$(printf "\n" | gnome-keyring-daemon --unlock --components=secrets)"
            printf "simplecrm-ci" | timeout 10s secret-tool store --label="SimpleCRM CI" simplecrm ci
            test "$(timeout 10s secret-tool lookup simplecrm ci)" = "simplecrm-ci"
            exec xvfb-run --auto-servernum --server-args="-screen 0 1440x1000x24" pnpm run test:e2e
          '

      - name: Upload Electron E2E diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: electron-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 14

  server-compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      VERSION: ci-smoke
      PUBLIC_DOMAIN: localhost
      CADDY_HTTP_PORT: "8080"
      CADDY_HTTPS_PORT: "8443"
      PUBLIC_BASE_URL: https://localhost:8443
      PG_ADMIN_PASSWORD: ci-smoke-admin-password
      PG_PASSWORD: ci-smoke-password
      ATTACHMENTS_DIR: /app/data/attachments
      AUDIT_ARCHIVE_DIR: /app/data/audit-archive
      JOB_WORKER_ENABLED: "false"
      JOB_WORKER_MAIL_ACCOUNT_COUNT: "0"
      JOB_WORKER_AI_CONCURRENCY: "5"
      JOB_WORKER_MIGRATE_ON_START: "false"
      JOB_WEBHOOK_ALLOWLIST: ""
      DOCTOR_REQUIRE_BACKUP: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate smoke secrets
        shell: bash
        run: |
          {
            printf 'MASTER_KEY=%s\n' "$(openssl rand -base64 32)"
            printf 'ACCESS_TOKEN_SECRET=%s\n' "$(openssl rand -base64 32)"
          } >> "$GITHUB_ENV"

      - name: Validate Docker Compose config
        run: docker compose -f docker/docker-compose.yml config

      - name: Start PostgreSQL, migrate, API, Caddy, backup, and restore drill
        shell: bash
        run: |
          set -euo pipefail
          project="simplecrm-ci-smoke"
          cleanup() {
            docker compose -p "$project" -f docker/docker-compose.yml down -v --remove-orphans || true
          }
          trap cleanup EXIT

          docker compose -p "$project" -f docker/docker-compose.yml up -d --build postgres migrate api caddy

          healthy=false
          for _ in {1..60}; do
            health="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "${project}-api-1" 2>/dev/null || true)"
            if [ "$health" = "healthy" ]; then
              healthy=true
              break
            fi
            sleep 3
          done

          if [ "$healthy" != "true" ]; then
            docker compose -p "$project" -f docker/docker-compose.yml ps || true
            docker compose -p "$project" -f docker/docker-compose.yml logs --no-color --tail=120 api migrate postgres caddy || true
            exit 1
          fi

          caddy_healthy=false
          for _ in {1..30}; do
            if curl --fail --silent --show-error --insecure "https://localhost:${CADDY_HTTPS_PORT}/health" | grep -q '"api":"simplecrm-server"'; then
              caddy_healthy=true
              break
            fi
            sleep 2
          done

          if [ "$caddy_healthy" != "true" ]; then
            docker compose -p "$project" -f docker/docker-compose.yml ps || true
            docker compose -p "$project" -f docker/docker-compose.yml logs --no-color --tail=120 caddy api || true
            exit 1
          fi

          docker compose -p "$project" -f docker/docker-compose.yml ps
          docker compose -p "$project" -f docker/docker-compose.yml exec -T api node packages/server/dist/cli/rls-check.js
          docker compose -p "$project" -f docker/docker-compose.yml --profile backup run --rm backup
          docker compose -p "$project" -f docker/docker-compose.yml --profile doctor run --rm doctor
          docker compose -p "$project" -f docker/docker-compose.yml --profile restore-drill run --rm restore-drill
          docker compose -p "$project" -f docker/docker-compose.yml ps
